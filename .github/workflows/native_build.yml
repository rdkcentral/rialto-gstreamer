name: Native Build

on:
  pull_request:
    branches: ["master", "release/*"]
  push:
    branches: ["master", "release/*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: rialto-gstreamer

      # Check, from which rialto branch should we download headers
      - name: Check if rialto branch with the same name exists
        id: check-branch
        shell: sh +e {0}
        run: |
          branch="${{ github.ref_name }}"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git ls-remote --exit-code --heads "https://github.com/rdkcentral/rialto.git" ${{ github.event.pull_request.head.ref }} > /dev/null
            if [ $? -eq 0 ]; then
              branch="${{ github.event.pull_request.head.ref }}"
            else
              git ls-remote --exit-code --heads "https://github.com/rdkcentral/rialto.git" ${{ github.event.pull_request.base.ref}} > /dev/null
              if [ $? -eq 0 ]; then
                branch="${{ github.event.pull_request.base.ref }}"
              else
                branch="master"
              fi
            fi
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Install Dependencies
        run: |
          WORK_DIR=$(pwd)

          echo "Using branch: ${{ steps.check-branch.outputs.branch }}"
          echo "Work dir: ${WORK_DIR}"

          cd rialto-gstreamer
          sudo sh -x -v install_dependencies_for_native_build.sh "${{ steps.check-branch.outputs.branch }}" "${WORK_DIR}" &> "${WORK_DIR}/output_file.txt"

      - name: Native build Rialto gstreamer
        run: |
          WORK_DIR=$(pwd)
          cd rialto-gstreamer
          sh -x -v build_native.sh "${WORK_DIR}" &>> "${WORK_DIR}/output_file.txt"

      - name: Report Build Status Success
        if: success()
        run: |
          echo "Build Succeeded!"
          exit 0

      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Output Logs
          path: |
            output_file.txt
